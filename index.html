<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yani's Weekly Habit Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F0E8; color: #2C2416; padding: 2rem; padding-bottom: 5rem; }
  .tracker-wrap { max-width: 860px; margin: 0 auto; background: #FDFAF4; border-radius: 16px; padding: 2rem; border: 1px solid #E2D9C8; }
  .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .week-nav { display: flex; align-items: center; gap: 12px; }
  .nav-btn { background: #F0E9D8; border: 1px solid #D9CEBC; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #5C4A2A; font-family: inherit; }
  .nav-btn:hover { background: #E8DEC9; }
  .week-label { font-size: 14px; color: #8C7A5A; font-weight: 500; min-width: 160px; text-align: center; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #F0E9D8; border-radius: 10px; padding: 12px 14px; border: 1px solid #E2D9C8; }
  .stat-label { font-size: 12px; color: #8C7A5A; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: #2C2416; }
  .grid-table { width: 100%; border-collapse: collapse; }
  .grid-table th { font-size: 12px; color: #8C7A5A; font-weight: 500; padding: 6px 4px; text-align: center; border-bottom: 1px solid #E2D9C8; }
  .grid-table td { padding: 9px 4px; text-align: center; border-bottom: 1px solid #EEE7D8; }
  .habit-name { text-align: left !important; font-size: 13px; color: #2C2416; padding-left: 0 !important; white-space: nowrap; }
  .habit-emoji { font-size: 13px; margin-right: 5px; }
  .check-cell { cursor: pointer; user-select: none; }
  .check-box { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #D9CEBC; background: #FDFAF4; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: background 0.15s; }
  .check-box.done { background: #A0845C; border-color: #A0845C; }
  .check-box.today-col { border-color: #C4A882; border-width: 2px; }
  .check-box.done.today-col { background: #8B6914; border-color: #8B6914; }
  .check-icon { width: 13px; height: 13px; display: none; }
  .check-box.done .check-icon { display: block; }
  .today-header { color: #8B6914 !important; font-weight: 600 !important; }
  .row-pct { font-size: 11px; color: #B0997A; }
  .section-title { font-size: 18px; font-weight: 500; color: #2C2416; }
  .category-row td { padding-top: 16px; padding-bottom: 2px; }
  .category-label { font-size: 10px; font-weight: 600; color: #B0997A; text-transform: uppercase; letter-spacing: 0.08em; text-align: left !important; }
</style>
</head>
<body>
<div class="tracker-wrap">
  <div class="week-header">
    <span class="section-title" id="week-title">This week</span>
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">&#8592;</button>
      <span class="week-label" id="week-range"></span>
      <button class="nav-btn" onclick="changeWeek(1)">&#8594;</button>
    </div>
  </div>
 
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Completed today</div>
      <div class="stat-value" id="stat-today">0 / 9</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Week progress</div>
      <div class="stat-value" id="stat-week">0%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best streak</div>
      <div class="stat-value" id="stat-streak">0d</div>
    </div>
  </div>
 
  <table class="grid-table">
    <thead>
      <tr>
        <th style="text-align:left; width:32%">Habit</th>
        <th id="h0"></th><th id="h1"></th><th id="h2"></th>
        <th id="h3"></th><th id="h4"></th><th id="h5"></th><th id="h6"></th>
        <th>%</th>
      </tr>
    </thead>
    <tbody id="habit-body"></tbody>
  </table>
</div>
 
<script>
var HABITS = [
  { id: 'zoe', name: 'Walk Zoe', emoji: '🐾', category: 'Body' },
  { id: 'steps', name: '10k steps', emoji: '👟', category: 'Body' },
  { id: 'water', name: 'Water intake', emoji: '💧', category: 'Body' },
  { id: 'skincare', name: 'Skincare routine', emoji: '✨', category: 'Body' },
  { id: 'bed', name: 'Bed by 9pm', emoji: '🌙', category: 'Body' },
  { id: 'bible', name: 'Bible study / journaling', emoji: '📖', category: 'Mind & Spirit' },
  { id: 'reading', name: 'Reading', emoji: '📚', category: 'Mind & Spirit' },
  { id: 'creativity', name: 'Creativity', emoji: '🎨', category: 'Mind & Spirit' },
  { id: 'mealprep', name: 'Meal prep', emoji: '🥘', category: 'Home' }
];
 
var DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var weekOffset = 0;
var data = JSON.parse(localStorage.getItem('habitData') || '{}');
 
function save() { localStorage.setItem('habitData', JSON.stringify(data)); }
 
function getWeekStart(offset) {
  var now = new Date();
  var day = now.getDay();
  var monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}
 
function dateKey(d) { return d.toISOString().slice(0,10); }
 
function getWeekDates(offset) {
  var start = getWeekStart(offset);
  var dates = [];
  for(var i=0; i<7; i++) {
    var d = new Date(start);
    d.setDate(start.getDate() + i);
    dates.push(d);
  }
  return dates;
}
 
function formatRange(dates) {
  var opts = { month: 'short', day: 'numeric' };
  return dates[0].toLocaleDateString('en-US', opts) + ' - ' + dates[6].toLocaleDateString('en-US', opts);
}
 
function getTodayKey() { return dateKey(new Date()); }
 
function toggle(habitId, key) {
  if (!data[key]) data[key] = {};
  data[key][habitId] = !data[key][habitId];
  save();
  render();
}
 
function render() {
  var dates = getWeekDates(weekOffset);
  var todayKey = getTodayKey();
  var isCurrentWeek = weekOffset === 0;
 
  document.getElementById('week-range').textContent = formatRange(dates);
  document.getElementById('week-title').textContent = isCurrentWeek ? 'This week' : weekOffset === -1 ? 'Last week' : weekOffset < 0 ? Math.abs(weekOffset) + ' weeks ago' : weekOffset + (weekOffset > 1 ? ' weeks ahead' : ' week ahead');
 
  dates.forEach(function(d, i) {
    var el = document.getElementById('h'+i);
    var key = dateKey(d);
    var isToday = key === todayKey;
    el.textContent = DAY_LABELS[(i+1)%7];
    el.className = isToday ? 'today-header' : '';
  });
 
  var body = document.getElementById('habit-body');
  body.innerHTML = '';
 
  var totalPossible = 0, totalDone = 0, todayDone = 0;
  var lastCategory = null;
 
  HABITS.forEach(function(habit) {
    if (habit.category !== lastCategory) {
      var catRow = document.createElement('tr');
      catRow.className = 'category-row';
      var catTd = document.createElement('td');
      catTd.colSpan = 9;
      catTd.className = 'category-label';
      catTd.textContent = habit.category;
      catRow.appendChild(catTd);
      body.appendChild(catRow);
      lastCategory = habit.category;
    }
 
    var tr = document.createElement('tr');
    var rowDone = 0;
 
    var nameTd = document.createElement('td');
    nameTd.className = 'habit-name';
    nameTd.innerHTML = '<span class="habit-emoji">' + habit.emoji + '</span>' + habit.name;
    tr.appendChild(nameTd);
 
    dates.forEach(function(d, i) {
      var key = dateKey(d);
      var isToday = key === todayKey;
      var checked = data[key] && data[key][habit.id];
      if (checked) { rowDone++; totalDone++; if(isToday) todayDone++; }
      totalPossible++;
 
      var td = document.createElement('td');
      td.className = 'check-cell';
      var classes = 'check-box' + (checked ? ' done' : '') + (isToday ? ' today-col' : '');
      td.innerHTML = '<div class="' + classes + '"><svg class="check-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
      (function(hId, k) { td.onclick = function() { toggle(hId, k); }; })(habit.id, key);
      tr.appendChild(td);
    });
 
    var pctTd = document.createElement('td');
    pctTd.className = 'row-pct';
    pctTd.textContent = Math.round((rowDone/7)*100) + '%';
    tr.appendChild(pctTd);
 
    body.appendChild(tr);
  });
 
  document.getElementById('stat-today').textContent = todayDone + ' / ' + HABITS.length;
  document.getElementById('stat-week').textContent = Math.round((totalDone/totalPossible)*100) + '%';
 
  var streak = 0;
  var today = new Date(); today.setHours(0,0,0,0);
  for(var i=0; i<30; i++) {
    var d = new Date(today); d.setDate(today.getDate()-i);
    var k = dateKey(d);
    var allDone = HABITS.every(function(h) { return data[k] && data[k][h.id]; });
    if(allDone) streak++; else break;
  }
  document.getElementById('stat-streak').textContent = streak + 'd';
}
 
function changeWeek(dir) { weekOffset += dir; render(); }
 
render();
</script>
</body>
</html>
